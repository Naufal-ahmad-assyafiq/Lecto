name: lecto
description: Lecto - Automatic Lecturer Scheduling System using Forward Chaining
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # PDF export
  pdf: ^3.10.8
  printing: ^5.12.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  google_fonts: ^6.2.1
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Hive code generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
